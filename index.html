<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Road Runner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }

        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 10;
            pointer-events: none;
        }
        #hud .stat {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 16px;
            letter-spacing: 1px;
        }
        #hud .stat span { font-weight: bold; }
        #hud .score-value { color: #FFD700; }
        #hud .speed-value { color: #7FDBFF; }
        #hud .level-value { color: #FF6B6B; }

        #overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            background: rgba(10, 10, 30, 0.85);
            backdrop-filter: blur(6px);
            transition: opacity 0.4s;
        }
        #overlay.hidden { opacity: 0; pointer-events: none; }

        #overlay h1 {
            font-size: 52px;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.6);
        }
        #overlay .subtitle {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 30px;
        }
        #overlay .final-score {
            font-size: 28px;
            color: #FFD700;
            margin-bottom: 20px;
            display: none;
        }
        #overlay .instructions {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
            line-height: 2;
        }
        #overlay .instructions kbd {
            background: rgba(255,255,255,0.15);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: monospace;
            font-size: 14px;
        }
        #startBtn {
            background: linear-gradient(135deg, #FF6B6B, #ee5a24);
            color: #fff;
            border: none;
            padding: 14px 48px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(255, 107, 107, 0.4);
        }
        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(255, 107, 107, 0.6);
        }
    </style>
</head>
<body>

<div id="hud">
    <div class="stat">Score: <span class="score-value" id="scoreDisplay">0</span></div>
    <div class="stat">Speed: <span class="speed-value" id="speedDisplay">0</span></div>
    <div class="stat">Level: <span class="level-value" id="levelDisplay">1</span></div>
</div>

<div id="overlay">
    <h1 id="overlayTitle">Ball Road Runner</h1>
    <div class="subtitle" id="overlaySubtitle">Navigate the winding road. Dodge obstacles.</div>
    <div class="final-score" id="finalScore"></div>
    <div class="instructions">
        <kbd>&uarr;</kbd> Accelerate &nbsp; <kbd>&darr;</kbd> Brake<br>
        <kbd>&larr;</kbd> Steer Left &nbsp; <kbd>&rarr;</kbd> Steer Right
    </div>
    <button id="startBtn">START</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
    'use strict';

    // ─── CONFIG ─────────────────────────────────────────────
    const ROAD_WIDTH = 8;
    const ROAD_SEGMENT_LENGTH = 2;
    const ROAD_VISIBLE_AHEAD = 120;
    const ROAD_VISIBLE_BEHIND = 20;
    const BALL_RADIUS = 0.5;
    const BASE_SPEED = 0.15;
    const MAX_SPEED = 0.6;
    const ACCELERATION = 0.004;
    const DECELERATION = 0.006;
    const FRICTION = 0.001;
    const STEER_SPEED = 0.12;
    const STEER_RETURN = 0.04;
    const CAMERA_HEIGHT = 22;
    const CAMERA_LOOK_AHEAD = 15;

    // Happy colors palette
    const COLORS = {
        sky: 0x87CEEB,
        ground: 0x90EE90,
        road: 0x555566,
        roadEdge: 0xFFFFFF,
        roadCenter: 0xFFD700,
        ball: 0x111111,
        ballAccent: 0xCC0000,
        obstacles: [0xFF6B6B, 0xFFE66D, 0x4ECDC4, 0xA06CD5, 0xFF8C42, 0x6BCB77, 0xFF69B4, 0x48BFE3],
        trees: [0x2ECC71, 0x27AE60, 0x1ABC9C, 0x16A085],
        treetrunk: 0x8B4513,
        flowers: [0xFF69B4, 0xFFD700, 0xFF6B6B, 0xE056FF, 0xFF8C42]
    };

    // ─── GLOBALS ────────────────────────────────────────────
    let scene, camera, renderer;
    let ball, ballGroup;
    let roadPoints = [];
    let roadCurve = null;
    let roadMeshes = [];
    let edgeMeshes = [];
    let decorations = [];
    let obstacles = [];
    let obstaclePool = [];

    let gameState = 'menu'; // menu, playing, gameover
    let score = 0;
    let speed = 0;
    let travelDistance = 0;
    let lateralOffset = 0;
    let difficulty = 1;
    let lastObstacleDistance = 0;
    let totalRoadGenerated = 0;
    let nextCurveAngle = 0;
    let currentAngle = 0;

    const keys = {};
    const clock = new THREE.Clock();

    // DOM refs
    const scoreDisplay = document.getElementById('scoreDisplay');
    const speedDisplay = document.getElementById('speedDisplay');
    const levelDisplay = document.getElementById('levelDisplay');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlaySubtitle = document.getElementById('overlaySubtitle');
    const finalScore = document.getElementById('finalScore');
    const startBtn = document.getElementById('startBtn');

    // ─── INIT ───────────────────────────────────────────────
    function init() {
        // Scene
        scene = new THREE.Scene();
        scene.background = new THREE.Color(COLORS.sky);
        scene.fog = new THREE.Fog(COLORS.sky, 60, 140);

        // Camera (bird's eye with slight tilt)
        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, CAMERA_HEIGHT, 10);
        camera.lookAt(0, 0, -CAMERA_LOOK_AHEAD);

        // Renderer
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 120;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        scene.add(dirLight);

        // Ground plane
        const groundGeom = new THREE.PlaneGeometry(500, 500);
        const groundMat = new THREE.MeshLambertMaterial({ color: COLORS.ground });
        const ground = new THREE.Mesh(groundGeom, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.1;
        ground.receiveShadow = true;
        scene.add(ground);

        // Ball
        createBall();

        // Events
        window.addEventListener('keydown', (e) => { keys[e.key] = true; e.preventDefault(); });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });
        window.addEventListener('resize', onResize);
        startBtn.addEventListener('click', startGame);

        // Start render
        animate();
    }

    // ─── BALL CREATION ──────────────────────────────────────
    function createBall() {
        ballGroup = new THREE.Group();

        // Main ball (black)
        const ballGeom = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);
        const ballMat = new THREE.MeshPhongMaterial({
            color: COLORS.ball,
            specular: 0x444444,
            shininess: 80
        });
        ball = new THREE.Mesh(ballGeom, ballMat);
        ball.castShadow = true;
        ballGroup.add(ball);

        // Red stripe (accent ring)
        const stripeGeom = new THREE.TorusGeometry(BALL_RADIUS * 0.85, 0.06, 8, 32);
        const stripeMat = new THREE.MeshPhongMaterial({ color: COLORS.ballAccent, specular: 0x666666, shininess: 100 });

        const stripe1 = new THREE.Mesh(stripeGeom, stripeMat);
        stripe1.rotation.x = Math.PI / 2;
        ballGroup.add(stripe1);

        const stripe2 = new THREE.Mesh(stripeGeom, stripeMat);
        stripe2.rotation.y = Math.PI / 2;
        ballGroup.add(stripe2);

        // Red dot on top
        const dotGeom = new THREE.SphereGeometry(BALL_RADIUS * 0.25, 16, 16);
        const dotMat = new THREE.MeshPhongMaterial({ color: COLORS.ballAccent });
        const dot = new THREE.Mesh(dotGeom, dotMat);
        dot.position.y = BALL_RADIUS * 0.9;
        ballGroup.add(dot);

        ballGroup.position.y = BALL_RADIUS;
        scene.add(ballGroup);
    }

    // ─── ROAD GENERATION ────────────────────────────────────
    function generateRoadPoints(count) {
        const startIdx = roadPoints.length;
        let lastPoint = roadPoints.length > 0
            ? roadPoints[roadPoints.length - 1].clone()
            : new THREE.Vector3(0, 0, 0);

        for (let i = 0; i < count; i++) {
            // Increase winding with difficulty
            const curveFactor = 0.02 + difficulty * 0.008;
            const curveChange = (Math.random() - 0.5) * curveFactor * 2;
            currentAngle += curveChange;
            // Clamp angle so road doesn't loop back
            currentAngle = Math.max(-0.8, Math.min(0.8, currentAngle));

            const dx = Math.sin(currentAngle) * ROAD_SEGMENT_LENGTH;
            const dz = -ROAD_SEGMENT_LENGTH;
            const newPoint = new THREE.Vector3(
                lastPoint.x + dx,
                0,
                lastPoint.z + dz
            );
            roadPoints.push(newPoint);
            lastPoint = newPoint;
            totalRoadGenerated += ROAD_SEGMENT_LENGTH;
        }

        rebuildRoadCurve();
    }

    function rebuildRoadCurve() {
        roadCurve = new THREE.CatmullRomCurve3(roadPoints, false, 'catmullrom', 0.5);
    }

    function buildRoadMesh(startIdx, endIdx) {
        if (!roadCurve || roadPoints.length < 4) return;

        const totalLen = roadCurve.getLength();
        const divisions = (endIdx - startIdx) * 3;

        for (let i = 0; i < divisions; i++) {
            const t1 = (startIdx + (i / divisions) * (endIdx - startIdx)) / (roadPoints.length - 1);
            const t2 = (startIdx + ((i + 1) / divisions) * (endIdx - startIdx)) / (roadPoints.length - 1);

            if (t1 < 0 || t1 > 1 || t2 < 0 || t2 > 1) continue;

            const p1 = roadCurve.getPointAt(Math.min(t1, 1));
            const p2 = roadCurve.getPointAt(Math.min(t2, 1));

            const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
            const right = new THREE.Vector3(-dir.z, 0, dir.x);

            const hw = ROAD_WIDTH / 2;

            // Road surface
            const shape = new THREE.Shape();
            const v0 = new THREE.Vector3().copy(p1).add(right.clone().multiplyScalar(-hw));
            const v1 = new THREE.Vector3().copy(p1).add(right.clone().multiplyScalar(hw));
            const v2 = new THREE.Vector3().copy(p2).add(right.clone().multiplyScalar(hw));
            const v3 = new THREE.Vector3().copy(p2).add(right.clone().multiplyScalar(-hw));

            const geom = new THREE.BufferGeometry();
            const vertices = new Float32Array([
                v0.x, 0.01, v0.z,
                v1.x, 0.01, v1.z,
                v2.x, 0.01, v2.z,
                v0.x, 0.01, v0.z,
                v2.x, 0.01, v2.z,
                v3.x, 0.01, v3.z,
            ]);
            geom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
            geom.computeVertexNormals();

            const roadMesh = new THREE.Mesh(geom, new THREE.MeshLambertMaterial({ color: COLORS.road }));
            roadMesh.receiveShadow = true;
            scene.add(roadMesh);
            roadMeshes.push(roadMesh);

            // Edge lines (white dashes)
            if (i % 3 === 0) {
                const edgeGeo = new THREE.BoxGeometry(0.2, 0.05, 1.2);
                const edgeMat = new THREE.MeshLambertMaterial({ color: COLORS.roadEdge });

                const leftEdge = new THREE.Mesh(edgeGeo, edgeMat);
                leftEdge.position.copy(p1).add(right.clone().multiplyScalar(-hw + 0.3));
                leftEdge.position.y = 0.03;
                leftEdge.lookAt(p2.clone().add(right.clone().multiplyScalar(-hw + 0.3)));
                scene.add(leftEdge);
                edgeMeshes.push(leftEdge);

                const rightEdge = new THREE.Mesh(edgeGeo, edgeMat);
                rightEdge.position.copy(p1).add(right.clone().multiplyScalar(hw - 0.3));
                rightEdge.position.y = 0.03;
                rightEdge.lookAt(p2.clone().add(right.clone().multiplyScalar(hw - 0.3)));
                scene.add(rightEdge);
                edgeMeshes.push(rightEdge);
            }

            // Center dashes (gold)
            if (i % 6 === 0) {
                const dashGeo = new THREE.BoxGeometry(0.12, 0.04, 0.8);
                const dashMat = new THREE.MeshLambertMaterial({ color: COLORS.roadCenter });
                const dash = new THREE.Mesh(dashGeo, dashMat);
                const mid = new THREE.Vector3().lerpVectors(p1, p2, 0.5);
                dash.position.copy(mid);
                dash.position.y = 0.04;
                dash.lookAt(p2);
                scene.add(dash);
                edgeMeshes.push(dash);
            }
        }
    }

    function addDecorations(startIdx, endIdx) {
        if (!roadCurve || roadPoints.length < 4) return;

        for (let i = startIdx; i < endIdx; i += 2) {
            const t = i / (roadPoints.length - 1);
            if (t < 0 || t > 1) continue;
            const p = roadCurve.getPointAt(Math.min(t, 1));
            const nextT = Math.min(t + 0.01, 1);
            const p2 = roadCurve.getPointAt(nextT);
            const dir = new THREE.Vector3().subVectors(p2, p).normalize();
            const right = new THREE.Vector3(-dir.z, 0, dir.x);

            // Trees on both sides
            for (let side = -1; side <= 1; side += 2) {
                if (Math.random() > 0.35) continue;
                const offset = (ROAD_WIDTH / 2 + 3 + Math.random() * 8) * side;
                const treePos = p.clone().add(right.clone().multiplyScalar(offset));

                // Trunk
                const trunkH = 1.5 + Math.random() * 1.5;
                const trunkGeo = new THREE.CylinderGeometry(0.15, 0.25, trunkH, 6);
                const trunkMat = new THREE.MeshLambertMaterial({ color: COLORS.treetrunk });
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.copy(treePos);
                trunk.position.y = trunkH / 2;
                trunk.castShadow = true;
                scene.add(trunk);
                decorations.push(trunk);

                // Foliage
                const foliageR = 1 + Math.random() * 1.2;
                const foliageGeo = new THREE.SphereGeometry(foliageR, 8, 8);
                const foliageColor = COLORS.trees[Math.floor(Math.random() * COLORS.trees.length)];
                const foliageMat = new THREE.MeshLambertMaterial({ color: foliageColor });
                const foliage = new THREE.Mesh(foliageGeo, foliageMat);
                foliage.position.copy(treePos);
                foliage.position.y = trunkH + foliageR * 0.6;
                foliage.castShadow = true;
                scene.add(foliage);
                decorations.push(foliage);
            }

            // Small flowers
            if (Math.random() > 0.6) {
                for (let side = -1; side <= 1; side += 2) {
                    const offset = (ROAD_WIDTH / 2 + 1.5 + Math.random() * 4) * side;
                    const flowerPos = p.clone().add(right.clone().multiplyScalar(offset));
                    const flowerGeo = new THREE.SphereGeometry(0.2 + Math.random() * 0.15, 6, 6);
                    const flowerColor = COLORS.flowers[Math.floor(Math.random() * COLORS.flowers.length)];
                    const flowerMat = new THREE.MeshLambertMaterial({ color: flowerColor });
                    const flower = new THREE.Mesh(flowerGeo, flowerMat);
                    flower.position.copy(flowerPos);
                    flower.position.y = 0.2;
                    scene.add(flower);
                    decorations.push(flower);
                }
            }
        }
    }

    // ─── OBSTACLES ──────────────────────────────────────────
    function spawnObstacle(distanceAhead) {
        if (!roadCurve || roadPoints.length < 4) return;

        const t = distanceAhead / (roadPoints.length - 1);
        if (t < 0 || t > 0.98) return;

        const pos = roadCurve.getPointAt(Math.min(t, 1));
        const nextT = Math.min(t + 0.005, 1);
        const pos2 = roadCurve.getPointAt(nextT);
        const dir = new THREE.Vector3().subVectors(pos2, pos).normalize();
        const right = new THREE.Vector3(-dir.z, 0, dir.x);

        // Random lane offset
        const laneOffset = (Math.random() - 0.5) * (ROAD_WIDTH - 2);
        const obstPos = pos.clone().add(right.clone().multiplyScalar(laneOffset));

        // Random obstacle type
        const type = Math.floor(Math.random() * 4);
        let geom, height;
        switch (type) {
            case 0: // Box
                height = 0.6 + Math.random() * 0.6;
                geom = new THREE.BoxGeometry(0.8 + Math.random() * 0.6, height, 0.8 + Math.random() * 0.6);
                break;
            case 1: // Cylinder
                height = 0.8 + Math.random() * 0.5;
                geom = new THREE.CylinderGeometry(0.3, 0.5, height, 8);
                break;
            case 2: // Cone
                height = 1.0 + Math.random() * 0.4;
                geom = new THREE.ConeGeometry(0.45, height, 8);
                break;
            default: // Dodecahedron
                height = 0.7 + Math.random() * 0.4;
                geom = new THREE.DodecahedronGeometry(0.5);
                break;
        }

        const color = COLORS.obstacles[Math.floor(Math.random() * COLORS.obstacles.length)];
        const mat = new THREE.MeshPhongMaterial({ color: color, specular: 0x333333, shininess: 40 });
        const mesh = new THREE.Mesh(geom, mat);
        mesh.position.copy(obstPos);
        mesh.position.y = height / 2 + 0.05;
        mesh.castShadow = true;
        mesh.userData.roadT = t;
        mesh.userData.radius = 0.6;
        scene.add(mesh);
        obstacles.push(mesh);

        // Pulsing animation data
        mesh.userData.baseY = mesh.position.y;
        mesh.userData.pulseOffset = Math.random() * Math.PI * 2;
    }

    function updateObstacles(dt) {
        const time = clock.getElapsedTime();
        for (let i = obstacles.length - 1; i >= 0; i--) {
            const obs = obstacles[i];
            // Gentle hovering
            obs.position.y = obs.userData.baseY + Math.sin(time * 2 + obs.userData.pulseOffset) * 0.1;
            obs.rotation.y += dt * 0.5;

            // Remove far behind obstacles
            if (obs.position.z > ballGroup.position.z + 20) {
                scene.remove(obs);
                obs.geometry.dispose();
                obs.material.dispose();
                obstacles.splice(i, 1);
            }
        }
    }

    // ─── COLLISION DETECTION ────────────────────────────────
    function checkCollisions() {
        const ballPos = ballGroup.position;
        for (let i = 0; i < obstacles.length; i++) {
            const obs = obstacles[i];
            const dx = ballPos.x - obs.position.x;
            const dz = ballPos.z - obs.position.z;
            const dist = Math.sqrt(dx * dx + dz * dz);
            if (dist < BALL_RADIUS + obs.userData.radius) {
                return true;
            }
        }
        return false;
    }

    function checkOffRoad() {
        if (!roadCurve || roadPoints.length < 4) return false;

        // Find closest road point to ball
        const ballPos = ballGroup.position;
        let minDist = Infinity;
        const sampleCount = 200;
        for (let i = 0; i < sampleCount; i++) {
            const t = i / sampleCount;
            const p = roadCurve.getPointAt(t);
            const dx = ballPos.x - p.x;
            const dz = ballPos.z - p.z;
            const dist = Math.sqrt(dx * dx + dz * dz);
            if (dist < minDist) minDist = dist;
        }
        return minDist > ROAD_WIDTH / 2 + 0.3;
    }

    // ─── GAME STATE ─────────────────────────────────────────
    function startGame() {
        // Clear everything
        clearWorld();

        // Reset state
        score = 0;
        speed = 0;
        travelDistance = 0;
        lateralOffset = 0;
        difficulty = 1;
        lastObstacleDistance = 0;
        totalRoadGenerated = 0;
        currentAngle = 0;
        roadPoints = [];
        obstacles = [];

        // Generate initial road
        generateRoadPoints(200);
        buildRoadMesh(0, roadPoints.length - 1);
        addDecorations(0, roadPoints.length - 1);

        // Position ball at start
        const startPos = roadCurve.getPointAt(0.05);
        ballGroup.position.set(startPos.x, BALL_RADIUS, startPos.z);

        // Position camera directly behind ball at start
        camera.position.set(startPos.x, CAMERA_HEIGHT, startPos.z + CAMERA_LOOK_AHEAD);
        const aheadPos = roadCurve.getPointAt(0.09);
        camera.lookAt(aheadPos.x, 0, aheadPos.z);

        // Spawn initial obstacles
        for (let d = 30; d < 180; d += getObstacleSpacing()) {
            spawnObstacle(d / ROAD_SEGMENT_LENGTH);
            lastObstacleDistance = d;
        }

        // Hide overlay
        overlay.classList.add('hidden');
        gameState = 'playing';
    }

    function gameOver() {
        gameState = 'gameover';
        speed = 0;

        overlayTitle.textContent = 'Game Over';
        overlaySubtitle.textContent = 'You crashed!';
        finalScore.style.display = 'block';
        finalScore.textContent = 'Final Score: ' + Math.floor(score);
        startBtn.textContent = 'RETRY';
        overlay.classList.remove('hidden');
    }

    function getObstacleSpacing() {
        // Decreases with difficulty (more obstacles)
        return Math.max(4, 15 - difficulty * 1.2);
    }

    function clearWorld() {
        roadMeshes.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
        roadMeshes = [];
        edgeMeshes.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
        edgeMeshes = [];
        decorations.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
        decorations = [];
        obstacles.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
        obstacles = [];
    }

    // ─── UPDATE ─────────────────────────────────────────────
    function update(dt) {
        if (gameState !== 'playing') return;
        if (!roadCurve) return;

        // Speed control
        if (keys['ArrowUp']) {
            speed = Math.min(speed + ACCELERATION, MAX_SPEED);
        } else if (keys['ArrowDown']) {
            speed = Math.max(speed - DECELERATION, 0);
        } else {
            // Auto-accelerate to base speed
            if (speed < BASE_SPEED) {
                speed = Math.min(speed + ACCELERATION * 0.5, BASE_SPEED);
            }
            speed = Math.max(speed - FRICTION, 0);
        }

        // Steering
        if (keys['ArrowLeft']) {
            lateralOffset -= STEER_SPEED * (1 + speed * 2);
        }
        if (keys['ArrowRight']) {
            lateralOffset += STEER_SPEED * (1 + speed * 2);
        }

        // Clamp lateral offset to road width
        const maxLateral = ROAD_WIDTH / 2 - BALL_RADIUS - 0.2;
        lateralOffset = Math.max(-maxLateral, Math.min(maxLateral, lateralOffset));

        // Move along road
        travelDistance += speed;
        score += speed * 10;

        // Difficulty scaling
        difficulty = 1 + Math.floor(travelDistance / 100);

        // Get position on road
        const t = travelDistance / (roadPoints.length - 1);
        if (t >= 0.9) {
            // Generate more road
            const prevLen = roadPoints.length;
            generateRoadPoints(100);
            buildRoadMesh(prevLen - 2, roadPoints.length - 1);
            addDecorations(prevLen - 2, roadPoints.length - 1);
        }

        const clampedT = Math.min(t, 0.999);
        const roadPos = roadCurve.getPointAt(clampedT);
        const nextT = Math.min(clampedT + 0.002, 1);
        const roadNext = roadCurve.getPointAt(nextT);

        const roadDir = new THREE.Vector3().subVectors(roadNext, roadPos).normalize();
        const roadRight = new THREE.Vector3(-roadDir.z, 0, roadDir.x);

        // Ball position
        const targetX = roadPos.x + roadRight.x * lateralOffset;
        const targetZ = roadPos.z + roadRight.z * lateralOffset;
        ballGroup.position.x = targetX;
        ballGroup.position.z = targetZ;

        // Ball rolling animation
        const rollSpeed = speed * 10;
        ball.rotation.x -= rollSpeed * dt;
        if (keys['ArrowLeft']) ball.rotation.z += rollSpeed * dt * 0.3;
        if (keys['ArrowRight']) ball.rotation.z -= rollSpeed * dt * 0.3;

        // Spawn obstacles ahead
        const currentDist = travelDistance * ROAD_SEGMENT_LENGTH;
        const spawnAhead = 80 + difficulty * 10;
        while (lastObstacleDistance < currentDist + spawnAhead) {
            lastObstacleDistance += getObstacleSpacing();
            const idx = lastObstacleDistance / ROAD_SEGMENT_LENGTH;
            if (idx < roadPoints.length - 2) {
                spawnObstacle(idx);
                // Spawn multiple obstacles per row at higher difficulties
                if (difficulty > 3 && Math.random() < 0.4) {
                    spawnObstacle(idx + 0.5);
                }
                if (difficulty > 6 && Math.random() < 0.3) {
                    spawnObstacle(idx + 0.3);
                }
            }
        }

        // Update obstacles
        updateObstacles(dt);

        // Check collisions
        if (checkCollisions()) {
            gameOver();
            return;
        }

        // Check off-road
        if (checkOffRoad()) {
            // Slow down dramatically if off road
            speed *= 0.9;
            if (speed < BASE_SPEED * 0.3) {
                gameOver();
                return;
            }
        }

        // Camera follow (bird's eye)
        // Road goes in -Z direction, so "ahead" of the ball is more negative Z
        const lookAheadT = Math.min(clampedT + 0.04, 1);
        const lookAheadPos = roadCurve.getPointAt(lookAheadT);

        // Camera sits above and slightly behind the ball (+Z from ball)
        const desiredCamX = targetX;
        const desiredCamZ = targetZ + CAMERA_LOOK_AHEAD;

        camera.position.x += (desiredCamX - camera.position.x) * 0.12;
        camera.position.z += (desiredCamZ - camera.position.z) * 0.12;
        camera.position.y = CAMERA_HEIGHT;

        // Look at a point ahead of the ball on the road
        const lookTarget = new THREE.Vector3(
            lookAheadPos.x,
            0,
            lookAheadPos.z
        );
        camera.lookAt(lookTarget);

        // HUD
        scoreDisplay.textContent = Math.floor(score);
        speedDisplay.textContent = Math.floor(speed * 100);
        levelDisplay.textContent = difficulty;

        // Cleanup old road segments behind
        cleanupBehind();
    }

    function cleanupBehind() {
        const ballZ = ballGroup.position.z;
        const cleanThreshold = ballZ + 40;

        for (let i = roadMeshes.length - 1; i >= 0; i--) {
            const m = roadMeshes[i];
            const pos = new THREE.Vector3();
            m.geometry.computeBoundingBox();
            m.geometry.boundingBox.getCenter(pos);
            if (pos.z > cleanThreshold) {
                scene.remove(m);
                m.geometry.dispose();
                m.material.dispose();
                roadMeshes.splice(i, 1);
            }
        }

        for (let i = edgeMeshes.length - 1; i >= 0; i--) {
            if (edgeMeshes[i].position.z > cleanThreshold) {
                scene.remove(edgeMeshes[i]);
                edgeMeshes[i].geometry.dispose();
                edgeMeshes[i].material.dispose();
                edgeMeshes.splice(i, 1);
            }
        }

        for (let i = decorations.length - 1; i >= 0; i--) {
            if (decorations[i].position.z > cleanThreshold) {
                scene.remove(decorations[i]);
                decorations[i].geometry.dispose();
                decorations[i].material.dispose();
                decorations.splice(i, 1);
            }
        }
    }

    // ─── ANIMATE ────────────────────────────────────────────
    function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.05);
        update(dt);
        renderer.render(scene, camera);
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // ─── START ──────────────────────────────────────────────
    init();

})();
</script>
</body>
</html>
