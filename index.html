<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Road Runner</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="hud">
    <div class="stat">Score: <span class="score-value" id="scoreDisplay">0</span></div>
    <div class="stat">Speed: <span class="speed-value" id="speedDisplay">0</span></div>
    <div class="stat">Level: <span class="level-value" id="levelDisplay">1</span></div>
    <div class="stat" id="controllerStatus" style="display: none;">Controller: Connected</div>
</div>

<div id="overlay">
    <h1 id="overlayTitle">Ball Road Runner</h1>
    <div class="subtitle" id="overlaySubtitle">Navigate the winding road. Dodge obstacles.</div>
    <div class="final-score" id="finalScore"></div>
    <div class="instructions">
        <kbd>&uarr;</kbd> Accelerate &nbsp; <kbd>&darr;</kbd> Brake<br>
        <kbd>&larr;</kbd> Steer Left &nbsp; <kbd>&rarr;</kbd> Steer Right
    </div>
    <div class="instructions">
        <strong style="color: #FFD700;">&#127918; XBOX Controller:</strong><br>
        &#10216;Stick&#10217; Speed | &#10216;&#8592;&#8594;&#10217; Steer | A: Pause | B: Brake
    </div>
    <button id="startBtn">START</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="js/config.js"></script>
<script src="js/renderer.js"></script>
<script src="js/ball.js"></script>
<script src="js/road.js"></script>
<script src="js/obstacles.js"></script>
<script src="js/main.js"></script>
<script>
(function() {
    'use strict';

    function init() {
        // Scene, camera, renderer, lighting, ground
        ballGame.renderer.init();

        // Ball
        ballGame.createBall();

        // Events (keyboard, gamepad, start button)
        ballGame.main.setupEvents();

        // Start render loop
        ballGame.main.animate();
    }

    init();
})();
</script>
</body>
</html>
